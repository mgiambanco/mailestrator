name: MailClient

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.4"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  MailClient:
    type: application
    platform: iOS
    deploymentTarget: "16.4"

    sources:
      - path: MailClient
        excludes:
          - "**/*.md"

    info:
      path: MailClient/Info.plist
      properties:
        CFBundleDisplayName: Mail
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Push notifications require background fetch permission
        UIBackgroundModes:
          - remote-notification
        # Required for ATS — set your actual server hostname here
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false

    entitlements:
      path: MailClient/MailClient.entitlements

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.mailclient
        INFOPLIST_FILE: MailClient/Info.plist
        CODE_SIGN_STYLE: Automatic
        # Set your Apple Development Team ID here
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES
          ENABLE_BITCODE: NO

    dependencies:
      - sdk: WebKit.framework
      - sdk: UserNotifications.framework
